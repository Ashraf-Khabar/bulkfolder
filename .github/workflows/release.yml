name: Build and Release BulkFolder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter matplotlib

    - name: Get version from XML
      id: get_version
      shell: powershell
      run: |
        [xml]$project = Get-Content "project_info.xml"
        $version = $project.project.version
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
      # Récupère la version depuis project_info.xml

    - name: Create run.py launcher
      shell: powershell
      run: |
        @"
        import sys
        import os
        src_path = os.path.join(os.path.dirname(__file__), 'src')
        sys.path.insert(0, src_path)
        from bulkfolder.ui.main import main
        if __name__ == "__main__":
            main()
        "@ | Out-File -FilePath run.py -Encoding utf8

    - name: Build EXE with PyInstaller
      run: |
        python -m PyInstaller --noconfirm --windowed --name "BulkFolder" --icon="src/assets/logo.ico" --add-data="src/assets;assets" --paths="src" --collect-all customtkinter run.py
      # Utilise les ressources et icônes du projet

    - name: Compile Inno Setup
      shell: pwsh
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_script.iss

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        files: Output/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}